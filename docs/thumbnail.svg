<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#dbe3f0"/>
    </pattern>
    <filter id="card" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#1e293b" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="10" fill="url(#accent)"/>

  <!-- header -->
  <g transform="translate(64,60)">
    <rect x="0" y="0" width="52" height="52" rx="13" fill="#eff6ff"/>
    <g transform="translate(13,12)" fill="none" stroke="#3b82f6" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M13 4 v22 M1 22 V4 a2 2 0 0 1 2-2 h6 a2 2 0 0 1 2 2 M13 4 V2 a2 2 0 0 1 2-2 h6 a2 2 0 0 1 2 2 v20"/>
    </g>
    <text x="68" y="24" font-size="24" font-weight="700" fill="#0f172a">Creative Storytelling</text>
    <text x="68" y="48" font-size="16" fill="#64748b">AI-powered creative writing assistant</text>
  </g>

  <!-- pill -->
  <g transform="translate(64,168)">
    <rect x="0" y="0" width="290" height="36" rx="18" fill="#fef3c7"/>
    <circle cx="20" cy="18" r="5" fill="#eab308"/>
    <text x="36" y="24" font-size="15" font-weight="600" fill="#854d0e">Powered by Claude · Haiku + Sonnet</text>
  </g>

  <!-- headline -->
  <text x="64" y="270" font-size="62" font-weight="800" fill="#0f172a" letter-spacing="-1.5">Dump a raw idea.</text>
  <text x="64" y="344" font-size="62" font-weight="800" fill="#3b82f6" letter-spacing="-1.5">Get back a story.</text>

  <text x="64" y="398" font-size="22" fill="#475569">One rough scene in. A complete, multi-scene draft out —</text>
  <text x="64" y="430" font-size="22" fill="#475569">refined and expanded by a team of background agents.</text>

  <!-- agent chips -->
  <g transform="translate(64,470)" font-size="16" font-weight="600">
    <g>
      <rect x="0" y="0" width="150" height="40" rx="20" fill="#ffffff" stroke="#e2e8f0"/>
      <circle cx="22" cy="20" r="6" fill="#3b82f6"/>
      <text x="38" y="26" fill="#334155">Grammar</text>
    </g>
    <g transform="translate(166,0)">
      <rect x="0" y="0" width="160" height="40" rx="20" fill="#ffffff" stroke="#e2e8f0"/>
      <circle cx="22" cy="20" r="6" fill="#10b981"/>
      <text x="38" y="26" fill="#334155">Coherence</text>
    </g>
    <g transform="translate(342,0)">
      <rect x="0" y="0" width="158" height="40" rx="20" fill="#ffffff" stroke="#e2e8f0"/>
      <circle cx="22" cy="20" r="6" fill="#a855f7"/>
      <text x="38" y="26" fill="#334155">Character</text>
    </g>
    <g transform="translate(516,0)">
      <rect x="0" y="0" width="180" height="40" rx="20" fill="#ffffff" stroke="#e2e8f0"/>
      <circle cx="22" cy="20" r="6" fill="#eab308"/>
      <text x="38" y="26" fill="#334155">Scene Expand</text>
    </g>
  </g>

  <!-- url -->
  <text x="64" y="566" font-size="17" font-weight="600" fill="#3b82f6">manu49.github.io/Creative-Storytelling</text>

  <!-- ───────── right-side mock: idea card → manuscript ───────── -->
  <!-- raw idea card -->
  <g transform="translate(736,150)" filter="url(#card)">
    <rect x="0" y="0" width="150" height="150" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="16" y="30" font-size="12" font-weight="700" fill="#94a3b8" letter-spacing="0.5">RAW IDEA</text>
    <g fill="#cbd5e1">
      <rect x="16" y="46" width="118" height="9" rx="4.5"/>
      <rect x="16" y="64" width="100" height="9" rx="4.5"/>
      <rect x="16" y="82" width="118" height="9" rx="4.5"/>
      <rect x="16" y="100" width="76" height="9" rx="4.5"/>
    </g>
    <g transform="translate(16,118)">
      <rect x="0" y="0" width="92" height="20" rx="10" fill="#fef3c7"/>
      <text x="10" y="14" font-size="11" font-weight="600" fill="#854d0e">1 scene</text>
    </g>
  </g>

  <!-- arrow + sparkle -->
  <g transform="translate(902,212)">
    <path d="M0 13 H46" stroke="#3b82f6" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M38 4 L48 13 L38 22" fill="none" stroke="#3b82f6" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(16,-30)" fill="#3b82f6">
      <path d="M8 0 L10 6 L16 8 L10 10 L8 16 L6 10 L0 8 L6 6 Z"/>
    </g>
  </g>

  <!-- manuscript card -->
  <g transform="translate(960,118)" filter="url(#card)">
    <rect x="0" y="0" width="192" height="244" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="18" y="34" font-size="15" font-weight="800" fill="#0f172a" font-family="Georgia, serif">The Keeper's Letter</text>
    <line x1="18" y1="46" x2="174" y2="46" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="18" y="68" font-size="10" font-weight="700" fill="#94a3b8" letter-spacing="0.5">SCENE 1</text>
    <g fill="#cbd5e1">
      <rect x="18" y="78" width="148" height="7" rx="3.5"/>
      <rect x="18" y="92" width="148" height="7" rx="3.5"/>
      <rect x="18" y="106" width="120" height="7" rx="3.5"/>
    </g>
    <text x="18" y="138" font-size="10" font-weight="700" fill="#94a3b8" letter-spacing="0.5">SCENE 2</text>
    <g fill="#cbd5e1">
      <rect x="18" y="148" width="148" height="7" rx="3.5"/>
      <rect x="18" y="162" width="136" height="7" rx="3.5"/>
    </g>
    <!-- accepted suggestion tag -->
    <g transform="translate(18,186)">
      <rect x="0" y="0" width="148" height="38" rx="10" fill="#ecfdf5" stroke="#a7f3d0"/>
      <g transform="translate(12,12)" fill="none" stroke="#10b981" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M0 7 L5 12 L14 1"/>
      </g>
      <text x="36" y="24" font-size="12" font-weight="600" fill="#047857">Applied · 4 scenes</text>
    </g>
  </g>
</svg>
