version: '3.8'

services:
  backend:
    build: ./backend
    container_name: creative-storytelling-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=sqlite+aiosqlite:///./data/creative_storytelling.db
      - FAISS_INDEX_PATH=./data/faiss_index
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - HAIKU_MODEL=claude-haiku-4-5-20251001
      - SONNET_MODEL=claude-sonnet-4-6
      - AGENT_POLL_INTERVAL_SECONDS=3.0
      - AGENT_MAX_CONCURRENT_TASKS=2
      - CORS_ORIGINS=["http://localhost:3000"]
    command: >
      sh -c "pip install -e . &&
             alembic upgrade head &&
             uvicorn app.main:app --reload --host 0.0.0.0 --port 8000"
    networks:
      - creative-storytelling

  frontend:
    build: ./frontend
    container_name: creative-storytelling-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    command: npm run dev
    networks:
      - creative-storytelling
    depends_on:
      - backend

networks:
  creative-storytelling:
    driver: bridge
